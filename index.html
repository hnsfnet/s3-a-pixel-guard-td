<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>像素守卫 - Pixel Guard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <div class="hud">
            <div class="hud-item">
                <span class="hud-label">波次</span>
                <span id="wave-value" class="hud-value">1 / 3</span>
            </div>
            <div class="hud-item">
                <span class="hud-icon">💰</span>
                <span id="gold-value" class="hud-value gold">150</span>
            </div>
            <div class="hud-item">
                <span class="hud-icon">❤️</span>
                <div class="health-bar">
                    <div id="health-fill" class="health-fill"></div>
                    <span id="health-value" class="health-value">20 / 20</span>
                </div>
            </div>
            <div class="hud-item">
                <span class="hud-label">倒计时</span>
                <span id="countdown-value" class="hud-value countdown">10</span>
            </div>
            <div id="next-wave-preview" class="wave-preview">
                <span class="hud-label">下一波</span>
                <div id="preview-enemies" class="preview-enemies">
                </div>
            </div>
        </div>

        <div class="canvas-wrapper">
            <canvas id="game-canvas" width="800" height="600"></canvas>
            
            <div id="build-menu" class="build-menu hidden">
                <div class="build-menu-title">选择防御塔</div>
                <div class="tower-options">
                    <div class="tower-option" data-tower="ARROW">
                        <div class="tower-icon arrow-icon"></div>
                        <div class="tower-name">箭塔</div>
                        <div class="tower-stats">
                            <div class="stat-row">
                                <span class="stat-label">伤害</span>
                                <span class="stat-value">10</span>
                            </div>
                            <div class="stat-row">
                                <span class="stat-label">攻速</span>
                                <span class="stat-value">快</span>
                            </div>
                            <div class="stat-row">
                                <span class="stat-label">射程</span>
                                <span class="stat-value">3格</span>
                            </div>
                            <div class="stat-row">
                                <span class="stat-label">对空</span>
                                <span class="stat-value good">✓</span>
                            </div>
                        </div>
                        <div class="tower-cost">💰 50</div>
                    </div>
                    <div class="tower-option" data-tower="CANNON">
                        <div class="tower-icon cannon-icon"></div>
                        <div class="tower-name">炮塔</div>
                        <div class="tower-stats">
                            <div class="stat-row">
                                <span class="stat-label">伤害</span>
                                <span class="stat-value">35</span>
                            </div>
                            <div class="stat-row">
                                <span class="stat-label">攻速</span>
                                <span class="stat-value">慢</span>
                            </div>
                            <div class="stat-row">
                                <span class="stat-label">射程</span>
                                <span class="stat-value">4格</span>
                            </div>
                            <div class="stat-row">
                                <span class="stat-label">溅射</span>
                                <span class="stat-value">1.2格</span>
                            </div>
                            <div class="stat-row">
                                <span class="stat-label">对空</span>
                                <span class="stat-value bad">✗</span>
                            </div>
                        </div>
                        <div class="tower-cost">💰 100</div>
                    </div>
                </div>
                <button id="cancel-build" class="cancel-btn">取消</button>
            </div>

            <div id="upgrade-panel" class="upgrade-panel hidden">
                <div id="upgrade-title" class="upgrade-title">箭塔 Lv.1</div>
                <div id="upgrade-desc" class="upgrade-desc">基础箭塔，攻速快、伤害低、射程短</div>
                
                <div class="upgrade-section current">
                    <div class="section-title">当前属性</div>
                    <div id="current-stats" class="stats-grid"></div>
                </div>

                <div id="upgrade-next-section" class="upgrade-section next">
                    <div class="section-title">升级为：<span id="next-name"></span></div>
                    <div id="next-effects" class="effects-list"></div>
                    <div id="next-stats" class="stats-grid"></div>
                </div>

                <div id="max-level-section" class="max-level-section">
                    <div class="section-title max">⭐ 已满级 ⭐</div>
                    <div class="max-desc">已达到最高等级 3 级</div>
                </div>

                <div class="upgrade-actions">
                    <button id="cancel-upgrade" class="cancel-btn">关闭</button>
                    <button id="confirm-upgrade" class="upgrade-btn">
                        <span id="upgrade-cost">💰 80</span> 升级
                    </button>
                </div>
            </div>

            <div id="game-over" class="game-over hidden">
                <div class="game-over-content">
                    <h1 id="game-over-title">游戏结束</h1>
                    <div class="game-stats">
                        <div>通过波次：<span id="final-wave">0</span> / 3</div>
                        <div>剩余金币：<span id="final-gold">0</span></div>
                        <div>剩余生命：<span id="final-health">0</span></div>
                    </div>
                    <button id="restart-btn" class="restart-btn">重新开始</button>
                </div>
            </div>
        </div>

        <div class="instructions">
            <p>💡 点击绿色空地建塔 | 点击已建塔升级 | 只有箭塔能攻击飞行敌人 | 守护你的领地！</p>
        </div>
    </div>

    <script type="module" src="src/main.js"></script>
</body>
</html>
